## Minecraft Speedrun RL — Training Configuration

model:
  name: google/gemma-3-4b-it
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  max_seq_len: 4096

training:
  method: grpo  # Group Relative Policy Optimization
  epochs: 3
  batch_size: 4
  learning_rate: 1.0e-5
  grad_accum_steps: 4
  warmup_ratio: 0.1
  clip_range: 0.2
  kl_coeff: 0.05
  group_size: 8

environment:
  bot_api: http://127.0.0.1:3001
  tick_rate: 200  # 10x speed
  max_steps_per_episode: 50
  reset_between_episodes: true

tasks:
  - speedrun_easy
  - speedrun_medium
  - speedrun_hard
  - speedrun_full

reward:
  objective_completion: 0.5  # base reward for completing objective
  time_bonus_max: 0.5       # bonus for beating reference time
  death_penalty: -0.05
  step_penalty: -0.001      # encourage efficiency

checkpoints:
  dir: checkpoints
  save_every_epoch: true
  keep_last: 3
